<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">

		<title>
			eu_tomat
		</title>

		<link rel="stylesheet" href="style.css">
	</head>

	<body>
		<img src="penis.png" class="background-image">

		<div class="wrapper">
			<div class="list">
				<div class="group-box">
					<span class="legend">Measurements</span>

					<div class="content">
						<table class="measurements">
							<tr>
								<td> Air temperature: </td>
								<td class="measurement-info" field="temperature"></td>
								<td>°C</td>
							</tr>
							<tr>
								<td> Air humidity: </td>
								<td class="measurement-info" field="humidity"></td>
								<td>%</td>
							</tr>
							<tr>
								<td> Soil moisture: </td>
								<td class="measurement-info" field="soil_moisture"></td>
								<td>V</td>
							</tr>
						</table>
					</div>
				</div>
			</div>
		</div>
	</body>

	<script src="index.js"></script>
</html>
